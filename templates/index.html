<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Crypto Notifier</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🚀 Crypto Notifier</h1>

    <div class="card">

        <label>Код из Telegram</label>
        <input
                type="text"
                id="code"
                placeholder="Например A7F2K9"
        >

        <label>Монета</label>

        <select id="coin">

            <option>BTC</option>

            <option>ETH</option>

            <option>SOL</option>

            <option>XRP</option>

        </select>

        <label>Интервал (сек)</label>

        <input
                type="number"
                id="interval"
                value="30"
                min="5"
        >
        <button id="startButton">
            Запустить
        </button>
        <button id="stopBtn">
            Остановить уведомления
        </button>
        <p id="status"></p>

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
